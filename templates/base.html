<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Moja strona{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
          integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
<canvas id="particles"></canvas>
<header>
    <div id="top_title"> Marcin Piotrowski</div>
    <div id="bottom_ttile"> software engineer</div>
</header>
<div class="hamburger" onclick="toggleMenu()">☰ Menu</div>
<nav>
    <a class="menu {% if request.endpoint == 'blog.index' or request.endpoint == 'blog.post' %}active{% endif %} first"
       href="{{ url_for('blog.index') }}">{{ translations['blog'] }}</a>
    <a class="menu {% if request.endpoint == 'main.about' %}active{% endif %}"
       href="{{ url_for('main.about') }}">{{ translations['about_me'] }}</a>
    <a class="menu {% if request.endpoint == 'projects.index' %}active{% endif %}"
       href="{{ url_for('projects.index') }}">{{ translations['projects'] }}</a>
    <a class="menu {% if request.endpoint == 'contact.index' %}active{% endif %}"
       href="{{ url_for('contact.index') }}">{{ translations['contact'] }}</a>
    <div class="menu language-selector">
        {% if current_lang == 'pl' %}
            <a href="{{ url_for('main.set_language', language='en') }}"
               class="language-toggle"
               title="Switch to English">
                <img src="https://flagcdn.com/w20/gb.png" alt="EN" class="flag-icon"> EN
            </a>
        {% else %}
            <a href="{{ url_for('main.set_language', language='pl') }}"
               class="language-toggle"
               title="Przełącz na polski">
                <img src="https://flagcdn.com/w20/pl.png" alt="PL" class="flag-icon"> PL
            </a>
        {% endif %}
    </div>
</nav>
<div id="content">
    <div id="wrapper">
        {% block content %}{% endblock %}
    </div>
</div>
<footer>
    <a href="https://github.com/mpiotro4" target="_blank"><i class="fa fa-github"></i></a> &nbsp;&nbsp;&nbsp;&nbsp;
    <a href="https://www.linkedin.com/in/marcin-piotrowski-a0b7951a3/" target="_blank"><i
            class="fa fa-linkedin"></i></a>
    &nbsp;&nbsp;&nbsp;&nbsp;
    <a id="email-link" href="#">[email protected]</a>
</footer>
<script>
    function toggleMenu() {
        const nav = document.querySelector('nav');
        nav.classList.toggle('active');
    }

    document.addEventListener('DOMContentLoaded', function () {
        const emailLink = document.getElementById('email-link');
        const email = 'mpiotro4' + '@' + 'outlook.com';
        emailLink.href = 'mailto:' + email;
        emailLink.textContent = email;

        // Particle effect
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particleCount = 20;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.3 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(100, 124, 100, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Add glow effect
                ctx.shadowBlur = 8;
                ctx.shadowColor = `rgba(100, 124, 100, ${this.opacity * 0.5})`;
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // Connect nearby particles
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.strokeStyle = `rgba(100, 124, 100, ${0.2 * (1 - distance / 150)})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        init();
        animate();
    });
</script>
<!-- Prism.js core and language components -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-scss.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-docker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
</body>
</html>
